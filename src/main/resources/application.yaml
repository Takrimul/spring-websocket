spring:
  application:
    name: chat
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ws-chat}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Tak@123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

chat:
  security:
    jwt-secret: ${CHAT_JWT_SECRET:change-me-change-me-change-me-change-me}
    allow-dev-token: ${CHAT_ALLOW_DEV_TOKEN:true}
    jwt-expiration-seconds: ${CHAT_JWT_EXPIRATION_SECONDS:86400}
  websocket:
    allowed-origins: ${CHAT_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080,file://}
