<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WebSocket Chat Test Client</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    color: #1a1a18;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    color: #5f5e5a;
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 0.01em;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 960px;
    margin: 0 auto;
  }

  .panel {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 0.5px solid #e8e7e2;
  }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500;
    flex-shrink: 0;
  }
  .avatar.alice { background: #EEEDFE; color: #3C3489; }
  .avatar.bob   { background: #E1F5EE; color: #085041; }

  .panel-title { font-size: 14px; font-weight: 500; flex: 1; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #d3d1c7;
    transition: background 0.3s;
  }
  .status-dot.connected { background: #1D9E75; }

  .connect-btn {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 0.5px solid #d3d1c7;
    background: transparent;
    cursor: pointer;
    color: #3d3d3a;
    transition: background 0.15s;
  }
  .connect-btn:hover { background: #f5f5f0; }
  .connect-btn.connected { border-color: #F09595; color: #A32D2D; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 320px;
    max-height: 380px;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
  }
  .msg.mine  { align-self: flex-end; align-items: flex-end; }
  .msg.theirs { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 7px 11px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }
  .mine .bubble   { background: #534AB7; color: #fff; border-bottom-right-radius: 3px; }
  .theirs .bubble { background: #f1efe8; color: #1a1a18; border-bottom-left-radius: 3px; }

  .msg-meta {
    font-size: 10px;
    color: #888780;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tick { font-size: 10px; }
  .tick.seen { color: #1D9E75; }

  .system-msg {
    align-self: center;
    font-size: 11px;
    color: #888780;
    background: #f5f5f0;
    padding: 3px 10px;
    border-radius: 20px;
    border: 0.5px solid #e8e7e2;
  }

  .error-msg {
    align-self: center;
    font-size: 11px;
    color: #A32D2D;
    background: #FCEBEB;
    padding: 3px 10px;
    border-radius: 20px;
    border: 0.5px solid #F09595;
  }

  .typing-indicator {
    font-size: 11px;
    color: #888780;
    padding: 2px 4px;
    min-height: 18px;
    font-style: italic;
  }

  .input-area {
    padding: 10px 12px;
    border-top: 0.5px solid #e8e7e2;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .msg-input {
    width: 100%;
    padding: 8px 10px;
    font-size: 13px;
    border: 0.5px solid #d3d1c7;
    border-radius: 8px;
    outline: none;
    font-family: inherit;
    resize: none;
    height: 60px;
    color: #1a1a18;
    background: #fff;
  }
  .msg-input:focus { border-color: #7F77DD; }
  .msg-input:disabled { background: #f5f5f0; color: #888780; }

  .btn-row {
    display: flex;
    gap: 6px;
  }

  .send-btn {
    flex: 1;
    padding: 7px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn.alice-btn { background: #534AB7; color: #fff; }
  .send-btn.bob-btn   { background: #0F6E56; color: #fff; }

  .action-btn {
    padding: 7px 10px;
    font-size: 12px;
    border: 0.5px solid #d3d1c7;
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    color: #5f5e5a;
    transition: background 0.15s;
  }
  .action-btn:hover { background: #f5f5f0; }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .log-panel {
    max-width: 960px;
    margin: 12px auto 0;
    background: #1a1a18;
    border-radius: 10px;
    padding: 12px 14px;
    max-height: 160px;
    overflow-y: auto;
  }

  .log-title {
    font-size: 11px;
    color: #888780;
    font-family: monospace;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .log-line {
    font-size: 11px;
    font-family: 'Courier New', monospace;
    line-height: 1.6;
    color: #9FE1CB;
  }
  .log-line.err { color: #F09595; }
  .log-line.out { color: #FAC775; }
  .log-line.sys { color: #888780; }

  .room-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: #f9f9f7;
    border-bottom: 0.5px solid #e8e7e2;
    font-size: 12px;
    color: #5f5e5a;
  }
  .room-bar input {
    width: 60px;
    padding: 3px 6px;
    font-size: 12px;
    border: 0.5px solid #d3d1c7;
    border-radius: 5px;
    font-family: monospace;
    background: #fff;
    color: #1a1a18;
  }
</style>
</head>
<body>

<h1>WebSocket Chat Test Client &mdash; localhost:8080</h1>

<div class="panels">

  <!-- ALICE PANEL -->
  <div class="panel" id="alice-panel">
    <div class="panel-header">
      <div class="avatar alice">A</div>
      <div>
        <div class="panel-title">Alice</div>
      </div>
      <div class="status-dot" id="alice-dot"></div>
      <button class="connect-btn" id="alice-connect-btn" onclick="toggleConnect('alice')">Connect</button>
    </div>

    <div class="room-bar">
      Room&nbsp;
      <input type="text" id="alice-room" value="42" maxlength="20"/>
      <span style="color:#b4b2a9">| subscribes to /topic/chat.room.{id}</span>
    </div>

    <div class="messages" id="alice-messages"></div>
    <div class="typing-indicator" id="alice-typing"></div>

    <div class="input-area">
      <textarea class="msg-input" id="alice-input" placeholder="Type a message..." disabled
        oninput="handleTyping('alice')" onkeydown="handleKey(event,'alice')"></textarea>
      <div class="btn-row">
        <button class="send-btn alice-btn" onclick="sendMsg('alice')" disabled id="alice-send">Send</button>
        <button class="action-btn" onclick="sendTyping('alice', true)"  disabled id="alice-typing-btn" title="Send TYPING frame">Typing</button>
        <button class="action-btn" onclick="sendTyping('alice', false)" disabled id="alice-stop-btn"   title="Send STOP_TYPING">Stop</button>
        <button class="action-btn" onclick="sendEmpty('alice')"         disabled id="alice-err-btn"    title="Send empty msg to trigger error">Err</button>
      </div>
    </div>
  </div>

  <!-- BOB PANEL -->
  <div class="panel" id="bob-panel">
    <div class="panel-header">
      <div class="avatar bob">B</div>
      <div>
        <div class="panel-title">Bob</div>
      </div>
      <div class="status-dot" id="bob-dot"></div>
      <button class="connect-btn" id="bob-connect-btn" onclick="toggleConnect('bob')">Connect</button>
    </div>

    <div class="room-bar">
      Room&nbsp;
      <input type="text" id="bob-room" value="42" maxlength="20"/>
      <span style="color:#b4b2a9">| subscribes to /topic/chat.room.{id}</span>
    </div>

    <div class="messages" id="bob-messages"></div>
    <div class="typing-indicator" id="bob-typing"></div>

    <div class="input-area">
      <textarea class="msg-input" id="bob-input" placeholder="Type a message..." disabled
        oninput="handleTyping('bob')" onkeydown="handleKey(event,'bob')"></textarea>
      <div class="btn-row">
        <button class="send-btn bob-btn" onclick="sendMsg('bob')" disabled id="bob-send">Send</button>
        <button class="action-btn" onclick="sendTyping('bob', true)"  disabled id="bob-typing-btn">Typing</button>
        <button class="action-btn" onclick="sendTyping('bob', false)" disabled id="bob-stop-btn">Stop</button>
        <button class="action-btn" onclick="sendEmpty('bob')"         disabled id="bob-err-btn">Err</button>
      </div>
    </div>
  </div>

</div>

<!-- STOMP FRAME LOG -->
<div class="log-panel" id="log-panel">
  <div class="log-title">STOMP frame log</div>
  <div id="log-lines">
    <div class="log-line sys">Waiting for connections...</div>
  </div>
</div>

<script>
const SERVER = 'http://localhost:8080/ws';
const ROOM_ID = () => ({
  alice: document.getElementById('alice-room').value || '42',
  bob:   document.getElementById('bob-room').value   || '42',
});

const state = {
  alice: { client: null, connected: false, typingTimer: null, msgCount: 0 },
  bob:   { client: null, connected: false, typingTimer: null, msgCount: 0 },
};

const seenMap = {};

function log(text, type = '') {
  const el = document.getElementById('log-lines');
  const line = document.createElement('div');
  line.className = 'log-line' + (type ? ' ' + type : '');
  const ts = new Date().toTimeString().slice(0,8);
  line.textContent = '[' + ts + '] ' + text;
  el.appendChild(line);
  const panel = document.getElementById('log-panel');
  panel.scrollTop = panel.scrollHeight;
}

function toggleConnect(user) {
  if (state[user].connected) {
    disconnect(user);
  } else {
    connect(user);
  }
}

function connect(user) {
  const room = ROOM_ID()[user];
  log(user + ': connecting to ' + SERVER + ' as ' + user + '...', 'sys');

  const socket = new SockJS(SERVER);
  const client = Stomp.over(socket);

  client.debug = (msg) => {
    if (msg.includes('SEND') || msg.includes('MESSAGE') || msg.includes('CONNECT') || msg.includes('ERROR')) {
      log(user.toUpperCase() + ' STOMP: ' + msg.trim().split('\n')[0], 'sys');
    }
  };

  const headers = { Authorization: 'Bearer ' + user };

  client.connect(headers, (frame) => {
    state[user].client    = client;
    state[user].connected = true;
    log(user + ': connected ' + frame, 'out');
    updateUI(user, true);

    const roomId = ROOM_ID()[user];

    client.subscribe('/topic/chat.room.' + roomId, (msg) => {
      const data = JSON.parse(msg.body);
      handleIncoming(user, data);
    });

    client.subscribe('/user/queue/notifications', (msg) => {
      const data = JSON.parse(msg.body);
      handleNotification(user, data);
    });

    client.subscribe('/user/queue/errors', (msg) => {
      const data = JSON.parse(msg.body);
      log(user + ' ERROR: ' + data.errorCode + ' - ' + data.errorDetail, 'err');
      appendError(user, data.errorCode + ': ' + data.errorDetail);
    });

    client.subscribe('/user/queue/history', (msg) => {
      const data = JSON.parse(msg.body);
      handleIncoming(user, data);
    });

    appendSystem(user, 'Connected to room ' + roomId);
    state[user].client.send('/app/chat.history/' + roomId, {}, JSON.stringify({ roomId }));

  }, (err) => {
    log(user + ': connection error: ' + err, 'err');
    appendError(user, 'Connection failed: ' + err);
    state[user].connected = false;
    updateUI(user, false);
  });
}

function disconnect(user) {
  if (state[user].client) {
    state[user].client.disconnect(() => {
      log(user + ': disconnected', 'sys');
    });
    state[user].client    = null;
    state[user].connected = false;
    updateUI(user, false);
    appendSystem(user, 'Disconnected');
  }
}

function handleIncoming(user, data) {
  const me = user;

  if (data.type === 'TYPING' || data.type === 'STOP_TYPING') {
    if (data.from === me) return;
    const indicator = document.getElementById(user + '-typing');
    if (data.type === 'TYPING') {
      indicator.textContent = data.from + ' is typing...';
    } else {
      indicator.textContent = '';
    }
    return;
  }

  if (data.type === 'SYSTEM') {
    appendSystem(user, data.content);
    return;
  }

  if (data.type === 'CHAT') {
    const isMine = data.from === me;
    appendMessage(user, data, isMine);
    log(user + ' RECV CHAT from ' + data.from + ': ' + data.content + (data.history ? ' [history]' : ''), '');

    if (!isMine && !data.history) {
      setTimeout(() => sendSeen(user, data.id, data.from), 1200);
    }
  }
}

function handleNotification(user, data) {
  if (data.type === 'SEEN') {
    log(user + ': message ' + data.seenMessageId + ' was SEEN by ' + data.from, 'out');
    markSeen(user, data.seenMessageId);
  }
}

function appendMessage(user, data, isMine) {
  const container = document.getElementById(user + '-messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (isMine ? 'mine' : 'theirs');
  if (isMine) wrap.dataset.msgId = data.id;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = data.content;
  wrap.appendChild(bubble);

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const ts = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
  meta.innerHTML = '<span>' + (isMine ? 'You' : data.from) + '</span><span>' + ts + '</span>';

  if (isMine) {
    const tick = document.createElement('span');
    tick.className = 'tick';
    tick.id = 'tick-' + data.id;
    tick.textContent = '\u2713\u2713';
    meta.appendChild(tick);
  }

  wrap.appendChild(meta);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

function markSeen(user, msgId) {
  const tick = document.getElementById('tick-' + msgId);
  if (tick) {
    tick.classList.add('seen');
    tick.title = 'Seen';
  }
}

function appendSystem(user, text) {
  const container = document.getElementById(user + '-messages');
  const el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = text;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function appendError(user, text) {
  const container = document.getElementById(user + '-messages');
  const el = document.createElement('div');
  el.className = 'error-msg';
  el.textContent = text;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function sendMsg(user) {
  if (!state[user].connected) return;
  const input = document.getElementById(user + '-input');
  const content = input.value.trim();
  if (!content) return;
  const room = ROOM_ID()[user];

  const payload = JSON.stringify({ content, roomId: room });
  state[user].client.send('/app/chat.send/' + room, {}, payload);
  log(user + ' SEND: ' + content, 'out');
  input.value = '';

  clearTyping(user);
}

function sendEmpty(user) {
  if (!state[user].connected) return;
  const room = ROOM_ID()[user];
  state[user].client.send('/app/chat.send/' + room, {},
    JSON.stringify({ content: '', roomId: room })
  );
  log(user + ' SEND empty msg (should trigger VALIDATION_ERROR)', 'err');
}

function sendTyping(user, isTyping) {
  if (!state[user].connected) return;
  const room = ROOM_ID()[user];
  const type = isTyping ? 'TYPING' : 'STOP_TYPING';
  state[user].client.send('/app/chat.typing/' + room, {},
    JSON.stringify({ type, roomId: room })
  );
  log(user + ' SEND ' + type, 'sys');
}

function sendSeen(user, msgId, originalSender) {
  if (!state[user].connected) return;
  const room = ROOM_ID()[user];
  state[user].client.send('/app/chat.seen', {},
    JSON.stringify({ type: 'SEEN', seenMessageId: msgId, to: originalSender, roomId: room })
  );
  log(user + ' SEND SEEN for msg ' + msgId, 'out');
}

let typingTimers = { alice: null, bob: null };

function handleTyping(user) {
  sendTyping(user, true);
  clearTimeout(typingTimers[user]);
  typingTimers[user] = setTimeout(() => sendTyping(user, false), 3000);
}

function clearTyping(user) {
  clearTimeout(typingTimers[user]);
  sendTyping(user, false);
}

function handleKey(event, user) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMsg(user);
  }
}

function updateUI(user, connected) {
  const dot  = document.getElementById(user + '-dot');
  const btn  = document.getElementById(user + '-connect-btn');
  const ids  = ['send','typing-btn','stop-btn','err-btn'];

  dot.classList.toggle('connected', connected);
  btn.textContent = connected ? 'Disconnect' : 'Connect';
  btn.classList.toggle('connected', connected);

  document.getElementById(user + '-input').disabled = !connected;
  ids.forEach(id => {
    const el = document.getElementById(user + '-' + id);
    if (el) el.disabled = !connected;
  });
}
</script>
</body>
</html>
