<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DuoChat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f4f0; color: #1a1a18; padding: 16px; }
  .app { max-width: 780px; margin: 0 auto; }
  .card { background: #fff; border: 1px solid #d8d6ce; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  h1 { font-size: 22px; margin-bottom: 12px; }
  h2 { font-size: 16px; margin-bottom: 10px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  input, textarea, button { font: inherit; }
  input, textarea { width: 100%; border: 1px solid #d8d6ce; border-radius: 8px; padding: 8px 10px; }
  button { border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; background: #534ab7; color: #fff; }
  button.secondary { background: #0f6e56; }
  button.light { background: #efeee9; color: #222; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  #chat-view { display: none; }
  #messages { min-height: 360px; max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 8px; border: 1px solid #eceae2; border-radius: 10px; background: #fafaf8; }
  .msg { max-width: 78%; display: flex; flex-direction: column; gap: 2px; }
  .msg.mine { align-self: flex-end; align-items: flex-end; }
  .msg.theirs { align-self: flex-start; align-items: flex-start; }
  .bubble { border-radius: 12px; padding: 8px 10px; line-height: 1.45; font-size: 14px; }
  .mine .bubble { background: #534ab7; color: #fff; border-bottom-right-radius: 3px; }
  .theirs .bubble { background: #eceae2; color: #222; border-bottom-left-radius: 3px; }
  .meta { font-size: 11px; color: #8a887f; display: flex; gap: 6px; align-items: center; }
  .tick.seen { color: #1d9e75; }
  .system { align-self: center; font-size: 11px; color: #666; background: #efeee8; border-radius: 999px; padding: 3px 10px; }
  .error { color: #9e1d1d; font-size: 12px; margin-top: 4px; }
  #log { margin-top: 8px; max-height: 130px; overflow-y: auto; background: #1b1b18; color: #9fe1cb; border-radius: 8px; padding: 8px; font-family: monospace; font-size: 11px; }
  .status { font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="app">
  <h1>DuoChat</h1>

  <div id="auth-view" class="card">
    <div id="auth-grid">
      <div>
        <h2>Register</h2>
        <div class="row"><input id="reg-phone" placeholder="+8801XXXXXXXXX"/></div>
        <div class="row"><input id="reg-pass" type="password" placeholder="Password (min 8 chars)"/></div>
        <button onclick="register()">Create Account</button>
      </div>
      <div>
        <h2>Login</h2>
        <div class="row"><input id="login-phone" placeholder="+8801XXXXXXXXX"/></div>
        <div class="row"><input id="login-pass" type="password" placeholder="Password"/></div>
        <button class="secondary" onclick="login()">Login</button>
      </div>
    </div>
    <div id="auth-error" class="error"></div>
  </div>

  <div id="chat-view" class="card">
    <div class="row" style="justify-content: space-between; align-items:center;">
      <div>
        <div><strong id="me-phone"></strong></div>
        <div class="status" id="ws-status">Disconnected</div>
      </div>
      <button class="light" onclick="logout()">Logout</button>
    </div>
    <div class="row">
      <input id="peer-phone" placeholder="Receiver phone number"/>
      <button class="light" onclick="openChat()">Open Chat</button>
    </div>
    <div class="row">
      <input id="shared-key" type="password" placeholder="Optional shared key for E2EE"/>
    </div>

    <div id="messages"></div>

    <div class="row" style="margin-top: 10px;">
      <textarea id="message-input" placeholder="Type a message..." rows="3"></textarea>
    </div>
    <div class="row">
      <button onclick="sendMessage()">Send</button>
    </div>
    <div id="chat-error" class="error"></div>
    <div id="log"></div>
  </div>
</div>

<script>
const SERVER = 'http://localhost:8080/ws';
let token = null;
let myPhone = null;
let currentPeer = null;
let stomp = null;
const renderedIds = new Set();
const sentDelivered = new Set();
const sentSeen = new Set();
const messagesByPeer = {};

function log(line) {
  const el = document.getElementById('log');
  const ts = new Date().toTimeString().slice(0, 8);
  const div = document.createElement('div');
  div.textContent = `[${ts}] ${line}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function showError(target, text) {
  document.getElementById(target).textContent = text || '';
}

async function api(path, body) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || data.error || `HTTP ${res.status}`);
  return data;
}

async function register() {
  showError('auth-error', '');
  try {
    const data = await api('/api/auth/register', {
      phone: document.getElementById('reg-phone').value.trim(),
      password: document.getElementById('reg-pass').value
    });
    token = data.token; myPhone = data.phone;
    await openChatView();
  } catch (e) {
    showError('auth-error', String(e.message || e));
  }
}

async function login() {
  showError('auth-error', '');
  try {
    const data = await api('/api/auth/login', {
      phone: document.getElementById('login-phone').value.trim(),
      password: document.getElementById('login-pass').value
    });
    token = data.token; myPhone = data.phone;
    await openChatView();
  } catch (e) {
    showError('auth-error', String(e.message || e));
  }
}

async function openChatView() {
  document.getElementById('auth-view').style.display = 'none';
  document.getElementById('chat-view').style.display = 'block';
  document.getElementById('me-phone').textContent = `Logged in: ${myPhone}`;
  await connectWs();
}

function logout() {
  if (stomp) {
    stomp.disconnect(() => {});
  }
  token = null; myPhone = null; currentPeer = null; stomp = null;
  renderedIds.clear(); sentDelivered.clear(); sentSeen.clear();
  document.getElementById('messages').innerHTML = '';
  document.getElementById('auth-view').style.display = 'block';
  document.getElementById('chat-view').style.display = 'none';
}

function connectWs() {
  return new Promise((resolve, reject) => {
    const socket = new SockJS(SERVER);
    stomp = Stomp.over(socket);
    stomp.debug = () => {};
    stomp.connect({ Authorization: `Bearer ${token}` }, () => {
      document.getElementById('ws-status').textContent = 'Connected';
      stomp.subscribe('/user/queue/messages', async (frame) => {
        const msg = JSON.parse(frame.body);
        await handleIncomingMessage(msg);
      });
      stomp.subscribe('/user/queue/notifications', (frame) => {
        const msg = JSON.parse(frame.body);
        handleNotification(msg);
      });
      stomp.subscribe('/user/queue/errors', (frame) => {
        const msg = JSON.parse(frame.body);
        showError('chat-error', `${msg.errorCode}: ${msg.errorDetail}`);
      });
      resolve();
    }, (err) => {
      document.getElementById('ws-status').textContent = 'Disconnected';
      reject(err);
    });
  });
}

function normalizePhoneInput(v) {
  let p = String(v || '').trim().replace(/[\\s\\-()]/g, '');
  if (p && !p.startsWith('+')) p = '+' + p;
  return p;
}

async function openChat() {
  showError('chat-error', '');
  const peer = normalizePhoneInput(document.getElementById('peer-phone').value);
  if (!peer) {
    showError('chat-error', 'Receiver phone is required');
    return;
  }
  currentPeer = peer;
  if (!messagesByPeer[currentPeer]) messagesByPeer[currentPeer] = [];
  renderConversation();
  if (stomp) {
    stomp.send('/app/chat.sync', {}, JSON.stringify({ withPhone: currentPeer }));
    log(`Sync conversation with ${currentPeer}`);
  }
}

async function sendMessage() {
  showError('chat-error', '');
  if (!stomp || !currentPeer) {
    showError('chat-error', 'Open a chat and connect first');
    return;
  }
  const input = document.getElementById('message-input');
  const plain = input.value.trim();
  if (!plain) return;
  const encoded = await encodeOutgoing(plain);
  stomp.send('/app/chat.dm', {}, JSON.stringify({
    to: currentPeer,
    content: encoded.content,
    encrypted: encoded.encrypted
  }));
  input.value = '';
}

async function handleIncomingMessage(msg) {
  if (msg.type !== 'CHAT' || !msg.id) return;
  if (renderedIds.has(msg.id)) return;
  renderedIds.add(msg.id);

  const peer = (msg.from === myPhone) ? msg.to : msg.from;
  if (!messagesByPeer[peer]) messagesByPeer[peer] = [];

  const decoded = await decodeIncoming(msg.content, !!msg.encrypted);
  const safeMsg = { ...msg, content: decoded.content };
  messagesByPeer[peer].push(safeMsg);

  if (decoded.error) showError('chat-error', decoded.error);
  if (peer === currentPeer) renderConversation();
  if (peer !== currentPeer) log(`New message from ${peer}`);

  if (msg.from !== myPhone) {
    sendDelivered(msg.id);
    setTimeout(() => sendSeen(msg.id), 900);
  }
}

function handleNotification(msg) {
  if (msg.type === 'DELIVERED') {
    updateTick(msg.deliveredMessageId, 'delivered');
    return;
  }
  if (msg.type === 'SEEN') {
    updateTick(msg.seenMessageId, 'seen');
  }
}

function renderConversation() {
  const box = document.getElementById('messages');
  box.innerHTML = '';
  const list = messagesByPeer[currentPeer] || [];
  list.forEach((msg) => {
    const mine = msg.from === myPhone;
    const wrap = document.createElement('div');
    wrap.className = `msg ${mine ? 'mine' : 'theirs'}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = msg.content;
    wrap.appendChild(bubble);

    const meta = document.createElement('div');
    meta.className = 'meta';
    const ts = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
    meta.innerHTML = `<span>${mine ? 'You' : msg.from}</span><span>${ts}</span>`;
    if (mine) {
      const tick = document.createElement('span');
      tick.id = `tick-${msg.id}`;
      tick.className = 'tick';
      tick.textContent = '\u2713';
      tick.title = 'Sent';
      meta.appendChild(tick);
    }
    wrap.appendChild(meta);
    box.appendChild(wrap);
  });
  box.scrollTop = box.scrollHeight;
}

function updateTick(messageId, state) {
  if (!messageId) return;
  const tick = document.getElementById(`tick-${messageId}`);
  if (!tick) return;
  tick.textContent = '\u2713\u2713';
  tick.classList.toggle('seen', state === 'seen');
  tick.title = state === 'seen' ? 'Seen' : 'Delivered';
}

function sendDelivered(messageId) {
  if (!stomp || sentDelivered.has(messageId)) return;
  sentDelivered.add(messageId);
  stomp.send('/app/chat.delivered', {}, JSON.stringify({ deliveredMessageId: messageId }));
}

function sendSeen(messageId) {
  if (!stomp || sentSeen.has(messageId)) return;
  sentSeen.add(messageId);
  stomp.send('/app/chat.seen', {}, JSON.stringify({ seenMessageId: messageId }));
}

async function encodeOutgoing(plainText) {
  const keyText = document.getElementById('shared-key').value;
  if (!keyText) return { content: plainText, encrypted: false };
  try {
    const key = await deriveAesKey(keyText);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plainText));
    return { content: `${bytesToBase64(iv)}:${bytesToBase64(new Uint8Array(cipher))}`, encrypted: true };
  } catch (_) {
    return { content: plainText, encrypted: false };
  }
}

async function decodeIncoming(content, encrypted) {
  if (!encrypted) return { content };
  const keyText = document.getElementById('shared-key').value;
  if (!keyText) return { content: '[Encrypted message]', error: 'Missing shared key for encrypted message.' };
  try {
    const [ivPart, dataPart] = String(content || '').split(':');
    const key = await deriveAesKey(keyText);
    const plain = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: base64ToBytes(ivPart) },
      key,
      base64ToBytes(dataPart)
    );
    return { content: new TextDecoder().decode(plain) };
  } catch (_) {
    return { content: '[Encrypted message]', error: 'Failed to decrypt message. Check shared key.' };
  }
}

async function deriveAesKey(passphrase) {
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(passphrase));
  return crypto.subtle.importKey('raw', digest, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
}

function bytesToBase64(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function base64ToBytes(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
</script>
</body>
</html>
